<header class="site-header">

  <h1 class="site-title">
    <a href="{{ site.baseurl }}/" title="Home page"><img class="site-logo" src="{{ site.baseurl }}/assets/img/jf.svg"></a>
  </h1>

  <nav class="site-nav">
    {% for link in site.navigation %}
      {% assign current = nil %}
      {% if page.url contains link.url %}
        {% assign current = 'class="current"' %}
      {% endif %}
    <a href="{{ link.url | prepend: site.baseurl }}" {{ current }} {% if link.desc %} title="{{ link.desc }}" {% endif %}>{{ link.title }}</a>
    {% endfor %}
    <div class="theme-toggle" role="group" aria-label="Color theme">
      <button type="button" class="theme-toggle__btn" data-theme-set="light" aria-pressed="false">Light</button>
      <button type="button" class="theme-toggle__btn" data-theme-set="dark" aria-pressed="false">Dark</button>
    </div>
  </nav>

</header>
<!-- site-header -->
