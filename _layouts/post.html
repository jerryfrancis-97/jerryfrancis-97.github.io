---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%-d %b %Y" }}</time>
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-back">
    <a href="{{ '/writings/' | relative_url }}">← Back to writings</a>
  </div>
</article>
